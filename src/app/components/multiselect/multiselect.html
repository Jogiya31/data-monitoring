<div class="dropdown">
  <button
    class="btn ms__btn dropdown-toggle w-100 text-start"
    type="button"
    data-bs-toggle="dropdown"
  >
    {{ selectedItems.length ? selectedItems.length + ' Selected' : 'Select Items' }}
  </button>

  <div class="dropdown-menu ms__panel p-3 w-100">
    <input type="text" class="ms__search" placeholder="Search..." [(ngModel)]="searchText" />

    <div class="ms__list">
      @for (item of filteredOptions; track item.value) {
        <div class="ms__opt">
          <input
            type="checkbox"
            [checked]="isSelected(item)"
            (change)="toggleSelection(item)"
            [id]="'item-' + item.value"
          />

          <span class="form-check-label">
            {{ item.label }}
          </span>
        </div>
      } @empty {
        <div class="text-center text-muted py-2">No records found</div>
      }
    </div>

    <div class="ms__foot">
      <button type="button" class="ms__all" (click)="selectAll()">Select All</button>

      <button type="button" class="ms__clear" (click)="clearAll()">Clear</button>
    </div>
  </div>
</div>
