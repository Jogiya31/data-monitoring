<section class="filter-bar" id="filterBar">
  <div class="filter-bar__head">
    <button type="button" class="filter-bar__toggle" (click)="handleToggle()">
      <i class="bi bi-funnel-fill"></i> <span>Filters</span>
      <span class="filter-bar__count" style="display: none">0</span>
      <i [classList]="isOpen ? 'bi bi-chevron-up' : 'bi bi-chevron-down'"></i>
    </button>
    <span [class]="isOpen ? 'filter-bar__hint' : 'filter-bar__hint--active'" id="filterHint"
      >No filters applied</span
    >
  </div>
  @if (isOpen) {
    <div class="filter-bar__body" id="filterBarBody">
      <div class="filter-bar__rows">
        <div class="filter-bar__row">
          <div class="filter-bar__scope">
            <label>Scope</label>
            <div class="seg" role="radiogroup" aria-label="Scope">
              <label class="seg__item"
                ><input type="radio" name="mode" value="all" checked (change)="onModeChange($event)" /> All</label
              >
              <label class="seg__item"
                ><input type="radio" name="mode" value="critical" (change)="onModeChange($event)" /> Critical</label
              >
              <label class="seg__item"
                ><input type="radio" name="mode" value="pragati" (change)="onModeChange($event)" /> Pragati</label
              >
            </div>
          </div>
          <div class="filter-bar__field">
            <label>Sector</label>
            <div id="ms_sector">
              <app-multiselect
                [options]="sectorList"
                placeholder="All sectors"
                (selectionChange)="onSectorChange($event)"
              ></app-multiselect>
            </div>
          </div>
          <div class="filter-bar__field">
            <label>Department / Ministry</label>
            <div id="ms_department">
              <app-multiselect
                [options]="sectorList"
                placeholder="All departments"
                (selectionChange)="onDepartmentChange($event)"
              ></app-multiselect>
            </div>
          </div>
          <div class="filter-bar__field">
            <label>State</label>
            <div id="ms_state">
              <app-multiselect
                [options]="sectorList"
                placeholder="All states"
                (selectionChange)="onStateChange($event)"
              ></app-multiselect>
            </div>
          </div>
          <div class="filter-bar__field">
            <label>District</label>
            <div id="ms_district">
              <app-multiselect
                [options]="sectorList"
                placeholder="All districts"
                (selectionChange)="onDistrictChange($event)"
              ></app-multiselect>
            </div>
          </div>
          <div class="filter-bar__field search">
            <label>Search</label>
            <div class="filter-search">
              <i class="bi bi-search"></i>
              <input
                type="text"
                id="fSearch"
                placeholder="Search scheme, KPI, project, code…"
                aria-label="Search records"
              />
              <button type="button" class="fs-clear" aria-label="Clear search">
                <i class="bi bi-x-circle-fill"></i>
              </button>
            </div>
          </div>
        </div>
        <div class="filter-bar__row">
          <div class="filter-bar__field">
            <label>Scheme</label>
            <div id="ms_scheme">
              <app-multiselect
                [options]="sectorList"
                placeholder="All districts"
                (selectionChange)="onSchemeChange($event)"
              ></app-multiselect>
            </div>
          </div>
          <div class="filter-bar__field">
            <label>KPI</label>
            <div id="ms_kpi">
              <app-multiselect
                [options]="sectorList"
                placeholder="All districts"
                (selectionChange)="onKPIChange($event)"
              ></app-multiselect>
            </div>
          </div>
          <div class="filter-bar__field">
            <label>Data Frequency</label>
            <div id="ms_frequency">
              <app-multiselect
                [options]="sectorList"
                placeholder="All districts"
                (selectionChange)="onDataFrequencyChange($event)"
              ></app-multiselect>
            </div>
          </div>
          <div class="filter-bar__field dates">
            <label>Date range (From → To)</label>
            <div class="filter-bar__dates">
              <input
                type="date"
                id="fFrom"
                class="form-control form-control-sm"
                aria-label="From date"
              />
              <input
                type="date"
                id="fTo"
                class="form-control form-control-sm"
                aria-label="To date"
              />
            </div>
          </div>
          <div class="filter-bar__actions">
            <button class="btn-soft" type="button" id="btnResetFilters">
              <i class="bi bi-arrow-counterclockwise"></i> Reset
            </button>
            <button class="btn-apply" type="button" id="btnApply">
              <span class="dot-dirty"></span><i class="bi bi-funnel-fill"></i> Apply
            </button>
          </div>
        </div>
      </div>
      <div class="filter-bar__active" id="activeChips"></div>
    </div>
  }
</section>
