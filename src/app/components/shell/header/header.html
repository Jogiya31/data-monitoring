<header class="app-header">
  <div class="app-header__bar">
    <div class="app-header__left">
      <a routerLink="/dashboard" class="brand" aria-label="PRAYAS home">
        <span class="brand__mark">P</span>
        <span class="brand__text">PRAYAS<small>Data Monitoring Dashboard</small></span>
      </a>
    </div>
    <div class="app-header__right">
      <button class="icon-btn" type="button" title="Home" aria-label="Home" (click)="gotoHome()">
        <i class="bi bi-house-door"></i>
      </button>
      <button class="icon-btn" type="button" title="Refresh data" aria-label="Refresh data" (click)="referesh()">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <button class="icon-btn" type="button" title="Toggle theme" (click)="toggleTheme()" aria-label="Toggle light or dark theme">
        <i class="bi bi-moon-stars"></i>
      </button>
      <div class="bell">
        <button class="icon-btn" type="button" title="Alerts" aria-label="Open alerts">
          <i class="bi bi-bell"></i><span class="bell__badge">0</span>
        </button>
      </div>
      <div class="profile">
        <button class="profile__btn" type="button" aria-label="User menu">
          <span class="avatar">MA</span><i class="bi bi-chevron-down"></i>
        </button>
      </div>
    </div>
  </div>
</header>
