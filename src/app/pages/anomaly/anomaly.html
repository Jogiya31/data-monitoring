<div class="content">
  <div class="page-head">
    <h1>Data Anomaly Analysis</h1>
    <p>
      Detect zero, consecutive-zero, negative, cumulative-dip and abnormal-spike patterns within
      each frequency.
    </p>
  </div>

  <section class="section">
    <div class="kpi-grid" id="deptKpis">
      @for (item of cards; track $index) {
        <app-kpi-card
          [cls]="item.cls"
          [icon]="item.icon"
          [label]="item.label"
          [value]="item.value"
          [foot]="item.foot"
        ></app-kpi-card>
      }
    </div>
  </section>

  <section class="card-surface section">
    <app-cards-section title="Zero value analysis" subtitle="Current value = 0" icon="0-circle">
      <div class="grid-2-1">
        <div class="table-scroll">
          <app-data-table
            [data]="tableData"
            [columns]="tableColumns"
            [order]="[[4, 'desc']]"
            [pageLength]="10"
            [Columns]="true"
            [CSV]="true"
            [Excel]="true"
            [PDF]="true"
            [Print]="true"
          ></app-data-table>
        </div>
        <div id="zeroTrend" class="chart-box sm">
          <app-chart
            type="line"
            [categories]="lineChartcategories"
            [series]="lineChartseries"
            [colors]="lineColors"
          ></app-chart>
        </div>
      </div>
    </app-cards-section>
  </section>

  <section class="card-surface section">
    <app-cards-section
      title="Consecutive zero analysis"
      subtitle="Current + previous = 0"
      icon="stack"
    >
      <div class="grid-2-1">
        <div class="chart-box">
          <app-chart
            type="bar"
            [horizontal]="true"
            [categories]="consecutiveCategories"
            [series]="consecutiveSeries"
            [colors]="lineColors"
          >
          </app-chart>
        </div>
        <div class="table-scroll">
          <app-data-table
            [data]="tableData"
            [columns]="consecutiveTableColumns"
            [order]="[[4, 'desc']]"
            [pageLength]="10"
            [Columns]="true"
            [CSV]="true"
            [Excel]="true"
            [PDF]="true"
            [Print]="true"
          ></app-data-table>
        </div>
      </div>
    </app-cards-section>
  </section>

  <section class="card-surface section">
    <app-cards-section
      title="Negative value analysis"
      subtitle="Current value &lt; 0"
      icon="dash-circle"
    >
      <div class="grid-2-1">
        <div class="table-scroll">
          <app-data-table
            [data]="tableData"
            [columns]="consecutiveTableColumns"
            [order]="[[4, 'desc']]"
            [pageLength]="10"
            [Columns]="true"
            [CSV]="true"
            [Excel]="true"
            [PDF]="true"
            [Print]="true"
          ></app-data-table>
        </div>
        <div class="chart-box sm">
          <app-chart
            type="bar"
            [horizontal]="true"
            [categories]="consecutiveCategories"
            [series]="consecutiveSeries"
            [colors]="lineColors"
          >
          </app-chart>
        </div>
      </div>
    </app-cards-section>
  </section>

  <section class="card-surface section">
    <app-cards-section
      title="Cumulative dip analysis"
      icon="funnel"
      subtitle="Current &lt; previous"
    >
      <div class="section__body grid-3">
        <div class="chart-box sm">
          <app-chart
            type="funnel"
            [categories]="funnelCategories"
            [series]="funnelSeries"
            [colors]="funnelColors"
          ></app-chart>
        </div>
        <div class="chart-box sm">
          <app-chart
            type="line"
            [horizontal]="true"
            [categories]="lineChartcategories"
            [series]="lineChartseries"
            [colors]="lineColors"
          ></app-chart>
        </div>
        <div class="chart-box sm">
          <app-chart
            type="bar"
            [horizontal]="true"
            [categories]="stateCategory"
            [series]="stateSeries"
            [colors]="barColors"
          ></app-chart>
        </div>
      </div>
    </app-cards-section>
  </section>

  <section class="card-surface section">
    <app-cards-section
      title="Abnormal spike analysis"
      subtitle="((Current − Previous) / Previous) × 100"
      icon="graph-up-arrow"
    >
      <div class="section__body">
        <div class="kpi-grid" id="deptKpis">
          @for (item of bands; track $index) {
            <app-kpi-card
              [cls]="item.cls"
              [icon]="item.icon"
              [label]="item.label"
              [value]="item.value"
              [foot]="item.foot"
            ></app-kpi-card>
          }
        </div>
        <div class="grid-3">
          <div>
            <h3 style="font-size: 13px; margin-bottom: 8px">State wise</h3>
            <div class="chart-box sm">
              <app-chart
                type="bar"
                [horizontal]="true"
                [categories]="consecutiveCategories"
                [series]="consecutiveSeries"
                [colors]="lineColors"
              >
              </app-chart>
            </div>
          </div>
          <div>
            <h3 style="font-size: 13px; margin-bottom: 8px">District wise</h3>
            <div id="spikeDistrict" class="chart-box sm">
              <app-chart
                type="bar"
                [horizontal]="true"
                [categories]="consecutiveCategories"
                [series]="consecutiveSeries"
                [colors]="DistrictColors"
              >
              </app-chart>
            </div>
          </div>
          <div>
            <h3 style="font-size: 13px; margin-bottom: 8px">Scheme wise</h3>
            <div id="spikeScheme" class="chart-box sm">
              <app-chart
                type="bar"
                [horizontal]="true"
                [categories]="consecutiveCategories"
                [series]="consecutiveSeries"
              >
              </app-chart>
            </div>
          </div>
        </div>
      </div>
    </app-cards-section>
  </section>
</div>
