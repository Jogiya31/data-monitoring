<div class="content">
  <div class="page-head">
    <div class="page-head__row">
      <div>
        <h1>Reports &amp; Analytics Center</h1>
        <p id="reportSubtitle">
          Generate, preview and export 17 standard PRAYAS reports for the current filtered view.
        </p>
      </div>
      <div class="pill-row">
        <span class="chip chip--muted" id="reportScopeChip"
          ><i class="bi bi-funnel"></i> Current filters applied</span
        >
      </div>
    </div>
  </div>

  <section class="grid-report section">
    <aside class="card-surface report-picker">
      <div class="section__head">
        <h2><i class="bi bi-collection"></i> Reports</h2>
      </div>
      <div class="section__body">
        <div class="report-toolbar">
          <input
            type="text"
            id="reportSearch"
            class="form-control form-control-sm"
            placeholder="Search reports…"
          />
          <div class="report-bulk">
            <label>
              <input
                type="checkbox"
                id="reportSelAll"
                [(ngModel)]="selectAll"
                (change)="toggleSelectAll()"
              />
              Select all
            </label>
            <span class="sel-n" id="reportSelN">{{ selectedCount }} selected</span>
          </div>
          <div class="report-dl">
            <button class="btn-soft" type="button" (click)="handleExcel()" id="dlSelExcel" disabled>
              <i class="bi bi-file-earmark-excel"></i> Excel
            </button>
            <button class="btn-soft" type="button" (click)="handleCSV()" id="dlSelZip" disabled>
              <i class="bi bi-file-earmark-zip"></i> CSV ZIP
            </button>
            <button
              class="btn-primary-solid"
              type="button"
              (click)="handleDownloadAll()"
              id="dlAll"
            >
              <i class="bi bi-download"></i> Download all
            </button>
          </div>
        </div>
        <div class="report-list">
          <div
            class="report-item"
            *ngFor="let r of filteredReports"
            (click)="loadReport(r); $event.stopPropagation()"
          >
            <input
              type="checkbox"
              [(ngModel)]="r.selected"
              (change)="onSelectionChange(); $event.stopPropagation()"
            />

            <span class="rname">
              <i class="bi bi-file-earmark-text"></i>
              {{ r.name }}
            </span>

            <i class="bi bi-chevron-right" style="color: var(--c-faint); font-size: 12px"></i>
          </div>
        </div>
      </div>
    </aside>
    <div class="card-surface">
      <app-cards-section title="{{selectedOption.name}}" icon="file-earmark-bar-graph">
        <app-data-table
          [data]="dynamicTableData"
          [columns]="dynamicTableColumns"
          [order]="[[4, 'desc']]"
          [pageLength]="10"
          [Columns]="true"
          [CSV]="true"
          [Excel]="true"
          [PDF]="true"
          [Print]="true"
        ></app-data-table>
      </app-cards-section>
    </div>
  </section>
</div>
